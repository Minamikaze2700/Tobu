<script>
/**
 * 0と1のみで構成されたフォントデータ
 */
let FONT_DATA = {};
async function loadFontData(){
  const txt = await fetch('font_data.txt').then(r=>r.text());
  FONT_DATA = eval('(' + txt + ')');
}

// ベースとなる3色LEDの発光カラー定義
const BASE_COLORS = {
    1: { r: 128, g: 255, b: 0,   css: 'rgb(128,255,0)' },  // 黄緑
    2: { r: 255, g: 0,   b: 64,  css: 'rgb(255,0,64)' },    // 赤
    3: { r: 255, g: 128, b: 64,  css: 'rgb(255,128,64)' }   // 橙
};

const RUN_INFO_FILE_NAME = '運行情報.txt';
const RUN_INFO_REFRESH_INTERVAL_MS = 5000;
const RUN_INFO_GAP_COLUMNS = 160;

const canvas = document.getElementById('ledCanvas');
const ctx = canvas.getContext('2d');

const ROWS = 16;
const COLS = 160;
const DOT_SIZE = 4;
const GAP = 2;
const STEP = DOT_SIZE + GAP;
const DISPLAY_SCROLL_COLUMNS_PER_SECOND = 60;
const DISPLAY_FADE_ALPHA_PER_SECOND = 45;
const VIDEO_SCROLL_COLUMNS_PER_SECOND = 60;

let scrollOffset = 0;
let animationFrameId = null;
let scrollStartTimestamp = null;
let runInfoAnimationFrameId = null;
let runInfoPollTimerId = null;
let runInfoKnownLines = new Set();
let runInfoLastSourceText = '';
let runInfoSequence = { matrix: null, totalWidth: 0 };

// 【新規追加】ディスプレイ上の各ドットの状態（色情報と現在の輝度）を記録するバッファ
const displayBuffer = Array.from({ length: ROWS }, () => 
    Array.from({ length: COLS }, () => ({ colorType: 0, alpha: 0.0 }))
);

function getGlyphWidth(char) {
    const glyph = FONT_DATA[char];
    if (glyph && glyph.length > 0 && Array.isArray(glyph[0])) {
        return glyph[0].length;
    }
    return char.charCodeAt(0) > 255 ? 16 : 8;
}

const runtimeGlyphCache = new Map();
const runtimeGlyphCanvas = document.createElement('canvas');

function rasterizeGlyph(char, width) {
    const cacheKey = `${char}:${width}`;
    if (runtimeGlyphCache.has(cacheKey)) {
        return runtimeGlyphCache.get(cacheKey);
    }

    const glyphWidth = Math.max(8, width);
    runtimeGlyphCanvas.width = glyphWidth;
    runtimeGlyphCanvas.height = ROWS;
    const gctx = runtimeGlyphCanvas.getContext('2d', { willReadFrequently: true });

    gctx.clearRect(0, 0, glyphWidth, ROWS);
    gctx.fillStyle = '#ffffff';
    gctx.fillRect(0, 0, glyphWidth, ROWS);
    gctx.fillStyle = '#000000';
    gctx.textAlign = 'center';
    gctx.textBaseline = 'middle';
    gctx.font = `${width >= 16 ? 14 : 8}px sans-serif`;
    gctx.fillText(char, glyphWidth / 2, ROWS / 2 + 1);

    const imageData = gctx.getImageData(0, 0, glyphWidth, ROWS).data;
    const glyph = Array.from({ length: ROWS }, () => Array(glyphWidth).fill(0));

    for (let row = 0; row < ROWS; row++) {
        for (let col = 0; col < glyphWidth; col++) {
            const idx = (row * glyphWidth + col) * 4;
            const brightness = (imageData[idx] + imageData[idx + 1] + imageData[idx + 2]) / 3;
            glyph[row][col] = brightness < 200 ? 1 : 0;
        }
    }

    runtimeGlyphCache.set(cacheKey, glyph);
    return glyph;
}

function getGlyphBitmap(char) {
    const glyph = FONT_DATA[char];
    if (glyph && glyph.length > 0 && Array.isArray(glyph[0])) {
        return glyph;
    }
    return rasterizeGlyph(char, getGlyphWidth(char));
}

function parseText(text) {
    const tokens = [];
    let currentColor = 1;
    let i = 0;

    while (i < text.length) {
        if (text[i] === '<') {
            const match = text.substring(i).match(/^<([123])>/);
            if (match) {
                currentColor = parseInt(match[1]);
                i += match[0].length;
                continue;
            }
        }

        const char = text[i];
        const width = getGlyphWidth(char);
        const isFullWidth = width >= 16;

        tokens.push({
            char: char,
            color: currentColor,
            width: width,
            isFullWidth: isFullWidth
        });
        i++;
    }
    return tokens;
}

function generateMessageMatrix(tokens) {
    let totalWidth = 0;
    tokens.forEach(t => totalWidth += t.width);
    
    const matrix = Array.from({ length: ROWS }, () => Array(totalWidth).fill(0));
    
    let currentX = 0;
    tokens.forEach(token => {
        const font = FONT_DATA[token.char] || FONT_DATA[token.isFullWidth ? ' ' : ' '];
        
        for (let row = 0; row < ROWS; row++) {
            for (let col = 0; col < token.width; col++) {
                const isLit = font[row] ? font[row][col] : 0;
                if (isLit === 1) {
                    matrix[row][currentX + col] = token.color;
                }
            }
        }
        currentX += token.width;
    });
    
    return { matrix, totalWidth };
}

// 【大幅変更】残光処理を反映してCanvasに描画する関数
function drawLEDWithAfterglow() {
    ctx.fillStyle = '#000000';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    for (let row = 0; row < ROWS; row++) {
        for (let col = 0; col < COLS; col++) {
            const dot = displayBuffer[row][col];
            
            // 塗りつぶしのベース色を決定
            let fillStyle = '#252525'; // 完全消灯時のLEDの素子色
            
            if (dot.alpha > 0.01 && dot.colorType !== 0) {
                const base = BASE_COLORS[dot.colorType];
                
                // 実機らしさを出すため、輝度(alpha)に応じた色の減衰を計算
                // 非線形（2乗）に落とすことで、より「じわっ」とした消え方になります
                const intensity = Math.pow(dot.alpha, 1.5);
                
                // 消灯時に完全に真っ黒ではなく、ほんのり赤み・緑みが残るように下限を設定
                const r = Math.max(37, Math.floor(base.r * intensity));
                const g = Math.max(37, Math.floor(base.g * intensity));
                const b = Math.max(37, Math.floor(base.b * intensity));
                fillStyle = `rgb(${r},${g},${b})`;
            }
            
            const cx = col * STEP + DOT_SIZE / 2 + GAP;
            const cy = row * STEP + DOT_SIZE / 2 + GAP;
            
            const x = col * STEP + GAP;
            const y = row * STEP + GAP;
            const r = DOT_SIZE * 0.25;

            ctx.beginPath();
            ctx.moveTo(x + r, y);
            ctx.lineTo(x + DOT_SIZE - r, y);
            ctx.quadraticCurveTo(x + DOT_SIZE, y, x + DOT_SIZE, y + r);
            ctx.lineTo(x + DOT_SIZE, y + DOT_SIZE - r);
            ctx.quadraticCurveTo(x + DOT_SIZE, y + DOT_SIZE, x + DOT_SIZE - r, y + DOT_SIZE);
            ctx.lineTo(x + r, y + DOT_SIZE);
            ctx.quadraticCurveTo(x, y + DOT_SIZE, x, y + DOT_SIZE - r);
            ctx.lineTo(x, y + r);
            ctx.quadraticCurveTo(x, y, x + r, y);
            ctx.closePath();
            ctx.fillStyle = fillStyle;
            ctx.fill();
        }
    }
}

function clearAnimationState() {
    if (animationFrameId) {
        cancelAnimationFrame(animationFrameId);
        animationFrameId = null;
    }
    if (runInfoAnimationFrameId) {
        cancelAnimationFrame(runInfoAnimationFrameId);
        runInfoAnimationFrameId = null;
    }
}

function stopRunInfoAutoRefresh() {
    if (runInfoPollTimerId) {
        clearInterval(runInfoPollTimerId);
        runInfoPollTimerId = null;
    }
}

function splitRunInfoLines(rawText) {
    return rawText
        .split(/\r?\n/)
        .map(line => line.trim())
        .filter(Boolean);
}

function buildRunInfoEntries(lines) {
    const uniqueLines = [];
    const seen = new Set();
    for (const line of lines) {
        if (!seen.has(line)) {
            seen.add(line);
            uniqueLines.push(line);
        }
    }

    const newLines = [];
    const existingLines = [];
    for (const line of uniqueLines) {
        if (runInfoKnownLines.has(line)) {
            existingLines.push(line);
        } else {
            newLines.push(line);
        }
    }

    runInfoKnownLines = new Set(uniqueLines);
    const ordered = [...newLines, ...existingLines];
    if (ordered.length === 0) {
        return ['現在、運行情報はありません'];
    }
    return ordered;
}

function buildRunInfoSequence(lines) {
    const entries = lines.map(line => {
        const tokens = parseText(`<2><運行情報>　<3>${line}`);
        return generateMessageMatrix(tokens);
    });

    const totalWidth = entries.reduce((sum, entry) => sum + entry.totalWidth, 0)
        + RUN_INFO_GAP_COLUMNS * Math.max(0, entries.length - 1);

    const matrix = Array.from({ length: ROWS }, () => Array(totalWidth).fill(0));
    let cursor = 0;

    entries.forEach((entry, index) => {
        for (let row = 0; row < ROWS; row++) {
            for (let col = 0; col < entry.totalWidth; col++) {
                matrix[row][cursor + col] = entry.matrix[row][col];
            }
        }
        cursor += entry.totalWidth;
        if (index < entries.length - 1) {
            cursor += RUN_INFO_GAP_COLUMNS;
        }
    });

    return { matrix, totalWidth };
}

async function fetchRunInfoText() {
    try {
        const response = await fetch(RUN_INFO_FILE_NAME, { cache: 'no-store' });
        if (!response.ok) {
            throw new Error(`HTTP ${response.status}`);
        }
        return await response.text();
    } catch (error) {
        return DEFAULT_RUN_INFO_TEXT;
    }
}

async function refreshRunInfoSequence({ preservePriority = true } = {}) {
    const rawText = await fetchRunInfoText();
    if (rawText === runInfoLastSourceText && runInfoSequence.matrix) {
        return false;
    }

    const lines = splitRunInfoLines(rawText);
    if (!preservePriority) {
        runInfoKnownLines = new Set();
    }
    const orderedLines = buildRunInfoEntries(lines);
    runInfoSequence = buildRunInfoSequence(orderedLines);
    runInfoLastSourceText = rawText;
    return true;
}

function startScrollingSequence(sequenceMatrix, totalWidth) {
    clearAnimationState();
    scrollOffset = -COLS;
    scrollStartTimestamp = null;

    function animate(timestamp) {
        if (scrollStartTimestamp === null) {
            scrollStartTimestamp = timestamp;
        }
        const deltaSec = Math.min((timestamp - scrollStartTimestamp) / 1000, 0.05);
        scrollStartTimestamp = timestamp;

        const fadeAmount = DISPLAY_FADE_ALPHA_PER_SECOND * deltaSec;
        for (let row = 0; row < ROWS; row++) {
            for (let col = 0; col < COLS; col++) {
                displayBuffer[row][col].alpha -= fadeAmount;
                if (displayBuffer[row][col].alpha < 0) {
                    displayBuffer[row][col].alpha = 0;
                }
            }
        }

        const intScrollOffset = Math.floor(scrollOffset);
        for (let row = 0; row < ROWS; row++) {
            for (let col = 0; col < COLS; col++) {
                const matrixX = col + intScrollOffset;
                if (matrixX >= 0 && matrixX < totalWidth) {
                    const colorType = sequenceMatrix[row][matrixX];
                    if (colorType !== 0) {
                        displayBuffer[row][col].colorType = colorType;
                        displayBuffer[row][col].alpha = 1.0;
                    }
                }
            }
        }

        drawLEDWithAfterglow();

        scrollOffset += DISPLAY_SCROLL_COLUMNS_PER_SECOND * deltaSec;
        if (scrollOffset > totalWidth) {
            scrollOffset = -COLS;
        }
        animationFrameId = requestAnimationFrame(animate);
    }

    animationFrameId = requestAnimationFrame(animate);
}

async function startRunInfoMode() {
    await refreshRunInfoSequence({ preservePriority: true });
    startScrollingSequence(runInfoSequence.matrix, runInfoSequence.totalWidth);
    stopRunInfoAutoRefresh();
    runInfoPollTimerId = setInterval(async () => {
        if (document.getElementById('alignSelect').value !== 'runinfo') {
            stopRunInfoAutoRefresh();
            return;
        }
        const changed = await refreshRunInfoSequence({ preservePriority: true });
        if (changed) {
            startScrollingSequence(runInfoSequence.matrix, runInfoSequence.totalWidth);
        }
    }, RUN_INFO_REFRESH_INTERVAL_MS);
}


async function updateDisplay() {
    clearAnimationState();
    stopRunInfoAutoRefresh();

    const text = document.getElementById('inputText').value;
    const align = document.getElementById('alignSelect').value;

    if (align === 'scroll') {
        const tokens = parseText(text);
        const { matrix, totalWidth } = generateMessageMatrix(tokens);
        startScrollingSequence(matrix, totalWidth);
        return;
    }

    if (align === 'runinfo') {
        await startRunInfoMode();
        return;
    }

    const tokens = parseText(text);
    const { matrix, totalWidth } = generateMessageMatrix(tokens);

    // 固定配置（左寄せ・中央・右寄せ）の場合は残光処理を行わず一発描画
    let startX = 0;
    if (align === 'center') {
        startX = Math.floor((COLS - totalWidth) / 2);
    } else if (align === 'right') {
        startX = COLS - totalWidth;
    }

    // バッファをクリアして固定文字をセット
    for (let row = 0; row < ROWS; row++) {
        for (let col = 0; col < COLS; col++) {
            const matrixX = col - startX;
            if (matrixX >= 0 && matrixX < totalWidth) {
                const colorType = matrix[row][matrixX];
                displayBuffer[row][col].colorType = colorType;
                displayBuffer[row][col].alpha = colorType !== 0 ? 1.0 : 0;
            } else {
                displayBuffer[row][col].colorType = 0;
                displayBuffer[row][col].alpha = 0;
            }
        }
    }
    drawLEDWithAfterglow();
}

document.getElementById('updateBtn').addEventListener('click', updateDisplay);
document.getElementById('inputText').addEventListener('keypress', function(e) {
    if (e.key === 'Enter') updateDisplay();
});

const exportBtn = document.getElementById('exportBtn');
const exportFormat = document.getElementById('exportFormat');
const exportNote = document.getElementById('exportNote');

function updateExportButtonState() {
    const isScroll = alignSelect.value === 'scroll';
    const exportGroup = exportFormat.closest('.control-group');
    exportGroup.style.display = isScroll ? 'none' : 'flex';
    exportNote.style.display = isScroll ? 'none' : 'block';
    exportFormat.disabled = false;
    exportBtn.disabled = false;
    exportBtn.textContent = '画像を出力';
    exportNote.textContent = '左寄せ・中央揃え・右寄せでは画像を出力します。';
}

function svgToDataURL(svgElement) {
    const clone = svgElement.cloneNode(true);
    clone.setAttribute('xmlns', 'http://www.w3.org/2000/svg');
    const serialized = new XMLSerializer().serializeToString(clone);
    return 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(serialized);
}

function roundRectPath(ctx, x, y, width, height, radius) {
    const r = Math.min(radius, width / 2, height / 2);
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + width - r, y);
    ctx.quadraticCurveTo(x + width, y, x + width, y + r);
    ctx.lineTo(x + width, y + height - r);
    ctx.quadraticCurveTo(x + width, y + height, x + width - r, y + height);
    ctx.lineTo(x + r, y + height);
    ctx.quadraticCurveTo(x, y + height, x, y + height - r);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
    ctx.closePath();
}


function parseBorderRadius(value) {
    if (!value) return 0;
    const m = String(value).match(/([\d.]+)px/);
    return m ? parseFloat(m[1]) : 0;
}

function drawRoundedRect(ctx, x, y, width, height, radius) {
    const r = Math.max(0, Math.min(radius, Math.min(width, height) / 2));
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + width - r, y);
    ctx.quadraticCurveTo(x + width, y, x + width, y + r);
    ctx.lineTo(x + width, y + height - r);
    ctx.quadraticCurveTo(x + width, y + height, x + width - r, y + height);
    ctx.lineTo(x + r, y + height);
    ctx.quadraticCurveTo(x, y + height, x, y + height - r);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
    ctx.closePath();
}

async function exportVisibleImage() {
    const currentMode = document.getElementById('alignSelect').value;
    if (currentMode === 'scroll' || currentMode === 'runinfo') {
        alert('画像出力は左寄せ・中央揃え・右寄せで使えます。');
        return;
    }

    const captureArea = document.getElementById('captureArea');
    const ledContainer = document.getElementById('led-container');
    const svg = ledContainer.querySelector('.speaker-grille');
    const areaRect = captureArea.getBoundingClientRect();
    const ledRect = ledContainer.getBoundingClientRect();
    const svgRect = svg.getBoundingClientRect();
    const canvasRect = canvas.getBoundingClientRect();

    const exportCanvas = document.createElement('canvas');
    exportCanvas.width = Math.max(1, Math.round(areaRect.width));
    exportCanvas.height = Math.max(1, Math.round(areaRect.height));
    const exCtx = exportCanvas.getContext('2d');

    const areaStyle = getComputedStyle(captureArea);
    exCtx.fillStyle = areaStyle.backgroundColor || '#d3d3d3';
    exCtx.fillRect(0, 0, exportCanvas.width, exportCanvas.height);

    // led-container の黒い角丸の背景も再現する
    const ledStyle = getComputedStyle(ledContainer);
    const ledX = Math.round(ledRect.left - areaRect.left);
    const ledY = Math.round(ledRect.top - areaRect.top);
    const ledW = Math.round(ledRect.width);
    const ledH = Math.round(ledRect.height);
    const ledRadius = parseBorderRadius(ledStyle.borderRadius);
    exCtx.fillStyle = ledStyle.backgroundColor || '#181818';
    drawRoundedRect(exCtx, ledX, ledY, ledW, ledH, ledRadius);
    exCtx.fill();

    const canvasImg = new Image();
    canvasImg.src = canvas.toDataURL('image/png');

    const svgImg = new Image();
    svgImg.src = svgToDataURL(svg);

    await Promise.all([
        new Promise((resolve, reject) => {
            canvasImg.onload = resolve;
            canvasImg.onerror = reject;
        }),
        new Promise((resolve, reject) => {
            svgImg.onload = resolve;
            svgImg.onerror = reject;
        })
    ]);

    const canvasX = Math.round(canvasRect.left - areaRect.left);
    const canvasY = Math.round(canvasRect.top - areaRect.top);
    exCtx.drawImage(canvasImg, canvasX, canvasY);

    const svgX = Math.round(svgRect.left - areaRect.left);
    const svgY = Math.round(svgRect.top - areaRect.top);
    exCtx.drawImage(svgImg, svgX, svgY, Math.round(svgRect.width), Math.round(svgRect.height));

    const fmt = exportFormat.value;
    const mime = fmt === 'jpg' ? 'image/jpeg' : 'image/png';
    const quality = fmt === 'jpg' ? 0.95 : undefined;
    const dataURL = exportCanvas.toDataURL(mime, quality);

    const a = document.createElement('a');
    a.href = dataURL;
    a.download = `led_display.${fmt}`;
    document.body.appendChild(a);
    a.click();
    a.remove();
}


const captureArea = document.getElementById('captureArea');
const ledContainer = document.getElementById('led-container');
const ledSvg = document.querySelector('.speaker-grille');

function getCaptureMetrics() {
    const areaRect = captureArea.getBoundingClientRect();
    const ledRect = ledContainer.getBoundingClientRect();
    const canvasRect = canvas.getBoundingClientRect();
    const svgRect = ledSvg.getBoundingClientRect();

    return {
        areaRect,
        ledRect,
        canvasRect,
        svgRect,
        areaBg: getComputedStyle(captureArea).backgroundColor || '#d3d3d3',
        ledBg: getComputedStyle(ledContainer).backgroundColor || '#181818',
        ledRadius: parseBorderRadius(getComputedStyle(ledContainer).borderRadius),
    };
}

function buildScrollExportMatrix(tokens) {
    const { matrix, totalWidth } = generateMessageMatrix(tokens);
    const padCols = 32;
    const paddedWidth = totalWidth + padCols * 2;
    const padded = Array.from({ length: ROWS }, () => Array(paddedWidth).fill(0));

    for (let row = 0; row < ROWS; row++) {
        for (let col = 0; col < totalWidth; col++) {
            padded[row][padCols + col] = matrix[row][col];
        }
    }

    return {
        matrix: padded,
        totalWidth: paddedWidth,
        visibleWidth: COLS,
        padCols,
    };
}

function drawMatrixFrame(targetCtx, matrix, drawX, drawY, scrollOffset = 0) {
    const baseX = Number.isFinite(drawX) ? drawX : 0;
    const baseY = Number.isFinite(drawY) ? drawY : 0;
    const offset = Number.isFinite(scrollOffset) ? Math.floor(scrollOffset) : 0;

    for (let row = 0; row < ROWS; row++) {
        for (let col = 0; col < COLS; col++) {
            const matrixX = col + offset;
            const colorType = (matrixX >= 0 && matrixX < matrix[0].length) ? matrix[row][matrixX] : 0;
            const base = BASE_COLORS[colorType];
            const fillStyle = colorType === 0 ? '#252525' : (base?.css || `rgb(${base.r},${base.g},${base.b})`);

            const x = baseX + col * STEP + GAP;
            const y = baseY + row * STEP + GAP;
            const r = DOT_SIZE * 0.25;

            targetCtx.beginPath();
            targetCtx.moveTo(x + r, y);
            targetCtx.lineTo(x + DOT_SIZE - r, y);
            targetCtx.quadraticCurveTo(x + DOT_SIZE, y, x + DOT_SIZE, y + r);
            targetCtx.lineTo(x + DOT_SIZE, y + DOT_SIZE - r);
            targetCtx.quadraticCurveTo(x + DOT_SIZE, y + DOT_SIZE, x + DOT_SIZE - r, y + DOT_SIZE);
            targetCtx.lineTo(x + r, y + DOT_SIZE);
            targetCtx.quadraticCurveTo(x, y + DOT_SIZE, x, y + DOT_SIZE - r);
            targetCtx.lineTo(x, y + r);
            targetCtx.quadraticCurveTo(x, y, x + r, y);
            targetCtx.closePath();
            targetCtx.fillStyle = fillStyle;
            targetCtx.fill();
        }
    }
}

async function createStaticCaptureBase(metrics) {
    const baseCanvas = document.createElement('canvas');
    baseCanvas.width = Math.round(metrics.areaRect.width);
    baseCanvas.height = Math.round(metrics.areaRect.height);
    const baseCtx = baseCanvas.getContext('2d');

    baseCtx.fillStyle = metrics.areaBg;
    baseCtx.fillRect(0, 0, baseCanvas.width, baseCanvas.height);

    const ledX = Math.round(metrics.ledRect.left - metrics.areaRect.left);
    const ledY = Math.round(metrics.ledRect.top - metrics.areaRect.top);
    const ledW = Math.round(metrics.ledRect.width);
    const ledH = Math.round(metrics.ledRect.height);

    baseCtx.fillStyle = metrics.ledBg;
    drawRoundedRect(baseCtx, ledX, ledY, ledW, ledH, metrics.ledRadius);
    baseCtx.fill();

    const canvasX = Math.round(metrics.canvasRect.left - metrics.areaRect.left);
    const canvasY = Math.round(metrics.canvasRect.top - metrics.areaRect.top);
    const canvasW = Math.round(metrics.canvasRect.width);
    const canvasH = Math.round(metrics.canvasRect.height);
    baseCtx.fillStyle = '#000000';
    baseCtx.fillRect(canvasX, canvasY, canvasW, canvasH);

    const svgImg = new Image();
    svgImg.src = svgToDataURL(ledSvg);
    await new Promise((resolve, reject) => {
        svgImg.onload = resolve;
        svgImg.onerror = reject;
    });

    const svgX = Math.round(metrics.svgRect.left - metrics.areaRect.left);
    const svgY = Math.round(metrics.svgRect.top - metrics.areaRect.top);
    baseCtx.drawImage(svgImg, svgX, svgY, Math.round(metrics.svgRect.width), Math.round(metrics.svgRect.height));

    return baseCanvas;
}
