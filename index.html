<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>運行情報 txt 自動同期ツール</title>
  <style>
    :root {
      --bg: #0f172a;
      --card: #111827;
      --panel: #1f2937;
      --line: #334155;
      --text: #e5e7eb;
      --muted: #94a3b8;
      --accent: #38bdf8;
      --danger: #f87171;
      --ok: #34d399;
      --warn: #fbbf24;
      --input: #0b1220;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(180deg, #020617 0%, var(--bg) 100%);
      color: var(--text);
    }
    .wrap {
      max-width: 1280px;
      margin: 0 auto;
      padding: 24px;
      display: grid;
      gap: 16px;
      grid-template-columns: 420px 1fr;
      align-items: start;
    }
    .card {
      background: rgba(17, 24, 39, 0.92);
      border: 1px solid var(--line);
      border-radius: 20px;
      box-shadow: 0 10px 35px rgba(0,0,0,.25);
      overflow: hidden;
    }
    .card h1, .card h2 {
      margin: 0;
      font-size: 20px;
      line-height: 1.2;
    }
    .card-header {
      padding: 18px 18px 14px;
      border-bottom: 1px solid var(--line);
      background: rgba(255,255,255,0.02);
    }
    .card-body { padding: 16px; }
    .grid {
      display: grid;
      gap: 12px;
    }
    label {
      display: grid;
      gap: 6px;
      font-size: 13px;
      color: var(--muted);
    }
    input, select, textarea, button {
      font: inherit;
    }
    input, select, textarea {
      width: 100%;
      border-radius: 14px;
      border: 1px solid var(--line);
      background: var(--input);
      color: var(--text);
      padding: 12px 14px;
      outline: none;
    }
    input:focus, select:focus, textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(56,189,248,.15);
    }
    textarea {
      min-height: 120px;
      resize: vertical;
      white-space: pre-wrap;
    }
    .row2 {
      display: grid;
      gap: 12px;
      grid-template-columns: 1fr 1fr;
    }
    .row3 {
      display: grid;
      gap: 12px;
      grid-template-columns: 1.3fr .7fr;
    }
    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    button {
      border: 0;
      border-radius: 14px;
      padding: 11px 14px;
      background: #334155;
      color: var(--text);
      cursor: pointer;
      transition: transform .06s ease, opacity .2s ease, background .2s ease;
    }
    button:hover { opacity: .92; }
    button:active { transform: translateY(1px); }
    .primary { background: linear-gradient(180deg, #22c55e, #16a34a); }
    .ghost { background: #334155; }
    .danger { background: linear-gradient(180deg, #ef4444, #dc2626); }
    .tiny {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.6;
    }
    .statusbar {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 13px;
      color: var(--muted);
      margin-top: 10px;
    }
    .dot {
      width: 10px; height: 10px; border-radius: 999px; background: var(--warn);
      box-shadow: 0 0 0 3px rgba(251,191,36,.12);
    }
    .dot.ok { background: var(--ok); box-shadow: 0 0 0 3px rgba(52,211,153,.12); }
    .dot.bad { background: var(--danger); box-shadow: 0 0 0 3px rgba(248,113,113,.12); }
    .list {
      display: grid;
      gap: 12px;
    }
    .item {
      border: 1px solid var(--line);
      border-radius: 18px;
      background: rgba(15, 23, 42, 0.7);
      padding: 14px;
      display: grid;
      gap: 10px;
    }
    .item-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: start;
    }
    .item-title {
      font-size: 15px;
      font-weight: 700;
      line-height: 1.4;
    }
    .item-meta {
      font-size: 12px;
      color: var(--muted);
      margin-top: 4px;
    }
    .item-body {
      white-space: pre-wrap;
      line-height: 1.8;
      word-break: break-word;
      background: rgba(255,255,255,0.02);
      border: 1px solid rgba(148,163,184,.18);
      border-radius: 14px;
      padding: 12px;
    }
    .preview {
      min-height: 380px;
      width: 100%;
    }
    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }
    .pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(56,189,248,.10);
      border: 1px solid rgba(56,189,248,.2);
      font-size: 12px;
      color: #bae6fd;
    }
    .two-col {
      display: grid;
      gap: 12px;
      grid-template-columns: 1fr 1fr;
    }
    .radio-grid {
      display: grid;
      gap: 8px;
    }
    .radio {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      color: var(--text);
      padding: 8px 10px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: rgba(255,255,255,.02);
    }
    .radio input { width: auto; }
    @media (max-width: 1050px) {
      .wrap { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="card">
      <div class="card-header">
        <h1>運行情報入力</h1>
      </div>
      <div class="card-body grid">
        <label>
          GitHub同期先 Worker URL
          <input id="workerUrl" placeholder="https://train-delay-sync.minamikaze2700.workers.dev" />
        </label>
        <div class="row2">
          <label>
            路線名
            <input id="routeJa" placeholder="東武スカイツリーライン" />
          </label>
          <label>
            路線名英語
            <input id="routeEn" placeholder="TOBU SKYTREE LINE" />
          </label>
        </div>
        <div class="row2">
          <label>
            時刻
            <input id="time" placeholder="12:34" />
          </label>
          <label>
            理由
            <input id="reason" placeholder="人身事故" />
          </label>
        </div>
        <div class="row2">
          <label>
            備考
            <input id="note" placeholder="再開見込みはありません" />
          </label>
          <label>
            状態
            <select id="status">
              <option value="delay">遅れがでています / Delay</option>
              <option value="accident">運転を見合わせています / Accident</option>
              <option value="delay2">運休および遅れがでています / Delay</option>
            </select>
          </label>
        </div>
        <div class="actions">
          <button class="primary" id="addBtn">この内容を登録</button>
          <button class="ghost" id="clearBtn">入力をクリア</button>
        </div>
        <div class="statusbar">
          <span id="syncDot" class="dot"></span>
          <span id="syncText">未接続</span>
        </div>
        <div class="tiny">
          日本語入力欄に入った英数字は自動で全角化します。英語欄は半角のまま保存されます。<br>
          登録した行は自動で GitHub 側の <code>unkojoho.txt</code> と <code>unkojoho.json</code> に反映されます。
        </div>
      </div>
    </section>

    <section class="card">
      <div class="card-header">
        <div class="toolbar">
          <div>
            <h2>登録済み情報</h2>
            <div class="tiny">各項目は個別の「解除」で削除されます。変更は自動同期です。</div>
          </div>
          <span class="pill">txt への書き出しは自動</span>
        </div>
      </div>
      <div class="card-body">
        <div class="two-col">
          <div>
            <div class="tiny" style="margin-bottom:8px;">生成プレビュー</div>
            <textarea id="preview" class="preview" readonly></textarea>
          </div>
          <div>
            <div class="tiny" style="margin-bottom:8px;">登録一覧</div>
            <div id="list" class="list"></div>
          </div>
        </div>
      </div>
    </section>
  </div>

<script>
const STORAGE_KEY = "train_delay_sync_config_v1";
const STATE_KEY = "train_delay_sync_state_v1";

const DEFAULT_STATUS = {
  delay: { ja: "遅れがでています", en: "Delay" },
  accident: { ja: "運転を見合わせています", en: "Accident" },
  delay2: { ja: "運休および遅れがでています", en: "Delay" },
};

const $ = (id) => document.getElementById(id);

const state = {
  items: [],
  saving: false,
  loadTimer: null,
  saveTimer: null,
};

function uid() {
  return `${Date.now().toString(36)}-${Math.random().toString(36).slice(2, 10)}`;
}

function toFullWidthAscii(text) {
  if (!text) return "";
  return String(text).replace(/[!-~]/g, ch => {
    if (ch === " ") return "　";
    return String.fromCharCode(ch.charCodeAt(0) + 0xFEE0);
  });
}

function normalizeJapaneseInput(text) {
  return toFullWidthAscii(text).replace(/\u3000{2,}/g, "　");
}

function sanitizeEnglish(text) {
  return String(text || "").replace(/\r?\n/g, " ").trim();
}

function getConfig() {
  try {
    return JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}");
  } catch {
    return {};
  }
}

function setConfig(partial) {
  const cfg = { ...getConfig(), ...partial };
  localStorage.setItem(STORAGE_KEY, JSON.stringify(cfg));
  return cfg;
}

function loadInputs() {
  const cfg = getConfig();
  $("workerUrl").value = cfg.workerUrl || "";
}

function saveInputs() {
  setConfig({ workerUrl: $("workerUrl").value.trim() });
}

function getStatusInfo(key) {
  return DEFAULT_STATUS[key] || DEFAULT_STATUS.delay;
}

function buildLine(item) {
  const status = getStatusInfo(item.status);
  const route = item.routeJa ? normalizeJapaneseInput(item.routeJa) : "";
  const routeEn = sanitizeEnglish(item.routeEn);
  const time = item.time ? normalizeJapaneseInput(item.time) : "";
  const reason = item.reason ? normalizeJapaneseInput(item.reason) : "";
  const note = item.note ? normalizeJapaneseInput(item.note) : "";

  const parts = [];
  if (route) parts.push(`${route}は`);
  if (time) parts.push(`${time}頃`);
  if (route || time) parts.push("　");
  if (reason) parts.push(`${reason}のため、`);
  parts.push(`${status.ja}。`);
  if (note) parts.push(`${note}　`);
  else parts.push("　");
  parts.push(`${routeEn}/${status.en}`);
  return parts.join("");
}

function generateText(items) {
  return items.map(buildLine).join("\n");
}

function render() {
  $("preview").value = generateText(state.items);
  const list = $("list");
  list.innerHTML = "";

  if (!state.items.length) {
    const empty = document.createElement("div");
    empty.className = "tiny";
    empty.textContent = "まだ登録がありません。";
    list.appendChild(empty);
    return;
  }

  state.items.forEach((item, index) => {
    const el = document.createElement("div");
    el.className = "item";

    const head = document.createElement("div");
    head.className = "item-head";

    const left = document.createElement("div");
    const title = document.createElement("div");
    title.className = "item-title";
    title.textContent = `${index + 1}. ${item.routeJa || "（路線名未入力）"}`;
    const meta = document.createElement("div");
    meta.className = "item-meta";
    meta.textContent = `${item.time || "時刻なし"} / ${getStatusInfo(item.status).ja}`;
    left.appendChild(title);
    left.appendChild(meta);

    const remove = document.createElement("button");
    remove.className = "danger";
    remove.textContent = "解除";
    remove.addEventListener("click", () => {
      state.items = state.items.filter(x => x.id !== item.id);
      scheduleSave();
      render();
    });

    head.appendChild(left);
    head.appendChild(remove);

    const body = document.createElement("div");
    body.className = "item-body";
    body.textContent = buildLine(item);

    el.appendChild(head);
    el.appendChild(body);
    list.appendChild(el);
  });
}

function currentInputItem() {
  const routeJa = normalizeJapaneseInput($("routeJa").value.trim());
  const routeEn = sanitizeEnglish($("routeEn").value.trim());
  const time = normalizeJapaneseInput($("time").value.trim());
  const reason = normalizeJapaneseInput($("reason").value.trim());
  const note = normalizeJapaneseInput($("note").value.trim());
  const status = $("status").value;

  if (!routeJa && !routeEn && !time && !reason && !note) return null;

  return {
    id: uid(),
    routeJa,
    routeEn,
    time,
    reason,
    note,
    status,
    createdAt: new Date().toISOString(),
  };
}

function scheduleSave() {
  clearTimeout(state.saveTimer);
  state.saveTimer = setTimeout(syncToWorker, 700);
}

function setSyncStatus(kind, text) {
  const dot = $("syncDot");
  dot.classList.remove("ok", "bad");
  if (kind === "ok") dot.classList.add("ok");
  if (kind === "bad") dot.classList.add("bad");
  $("syncText").textContent = text;
}

async function fetchStateFromWorker() {
  const workerUrl = $("workerUrl").value.trim();
  if (!workerUrl) {
    setSyncStatus("bad", "Worker URL 未設定");
    return;
  }
  try {
    setSyncStatus("", "同期中…");
    const res = await fetch(`${workerUrl.replace(/\/$/, "")}/state`, { cache: "no-store" });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    state.items = Array.isArray(data.items) ? data.items : [];
    render();
    localStorage.setItem(STATE_KEY, JSON.stringify(state.items));
    setSyncStatus("ok", "GitHub から読み込みました");
  } catch (err) {
    try {
      state.items = JSON.parse(localStorage.getItem(STATE_KEY) || "[]");
      render();
    } catch {}
    setSyncStatus("bad", "読み込み失敗（ローカル表示）");
  }
}

async function syncToWorker() {
  const workerUrl = $("workerUrl").value.trim();
  saveInputs();
  if (!workerUrl) {
    setSyncStatus("bad", "Worker URL 未設定");
    localStorage.setItem(STATE_KEY, JSON.stringify(state.items));
    return;
  }
  try {
    state.saving = true;
    setSyncStatus("", "書き出し中…");
    localStorage.setItem(STATE_KEY, JSON.stringify(state.items));
    const res = await fetch(`${workerUrl.replace(/\/$/, "")}/sync`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ items: state.items }),
    });
    if (!res.ok) {
      const text = await res.text();
      throw new Error(text || `HTTP ${res.status}`);
    }
    setSyncStatus("ok", "GitHub の txt/json を更新しました");
  } catch (err) {
    setSyncStatus("bad", "同期失敗");
    console.error(err);
  } finally {
    state.saving = false;
  }
}

function wireLiveConversion(id, english = false) {
  const input = $(id);
  input.addEventListener("input", () => {
    const before = input.value;
    const after = english ? sanitizeEnglish(before) : normalizeJapaneseInput(before);
    if (before !== after) {
      const pos = input.selectionStart;
      input.value = after;
      if (pos != null) input.setSelectionRange(pos, pos);
    }
    saveInputs();
  });
}

$("workerUrl").addEventListener("change", async () => {
  saveInputs();
  await fetchStateFromWorker();
});

$("addBtn").addEventListener("click", () => {
  const item = currentInputItem();
  if (!item) {
    setSyncStatus("bad", "入力が空です");
    return;
  }
  state.items.push(item);
  render();
  scheduleSave();
  ["routeJa","routeEn","time","reason","note"].forEach(id => $(id).value = "");
  setSyncStatus("", "登録しました");
});

$("clearBtn").addEventListener("click", () => {
  ["routeJa","routeEn","time","reason","note"].forEach(id => $(id).value = "");
  $("status").value = "delay";
  saveInputs();
  setSyncStatus("", "入力をクリアしました");
});

wireLiveConversion("routeJa", false);
wireLiveConversion("time", false);
wireLiveConversion("reason", false);
wireLiveConversion("note", false);
wireLiveConversion("routeEn", true);

$("status").addEventListener("change", () => {
  saveInputs();
});

loadInputs();
try {
  state.items = JSON.parse(localStorage.getItem(STATE_KEY) || "[]");
} catch {
  state.items = [];
}
render();
fetchStateFromWorker();

window.addEventListener("beforeunload", () => {
  localStorage.setItem(STATE_KEY, JSON.stringify(state.items));
});
</script>
</body>
</html>
